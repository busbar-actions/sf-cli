name: 'Busbar — sf-cli'
description: 'Run a declarative Salesforce CLI action inside a managed nono capability sandbox with a version-pinned sf install and a full audit trail.'
author: 'Busbar'

# A single declarative action (SfAction JSON) is executed inside a busbar-sandbox
# session: a nono capability sandbox whose network egress is kernel-forced through
# an in-process injecting proxy (`ProxyOnly`). The action records exactly which
# endpoints the `sf` invocation hit and the outcome, persisted as an audit artifact.
#
# AUTH (zero stored credentials): the sf-cli binary mints its OWN short-lived
# Salesforce session IN-PROCESS from the runner's GitHub OIDC id-token (exchanged
# at the Busbar-equipped org on `target-instance`) and HOLDS that token in the
# supervisor's own memory. It logs the managed `sf` CLI into the org through the
# proxy with a PLACEHOLDER token; the proxy swaps in the real `Authorization`
# header server-side, so the `~/.sf` entry that lands on disk carries only the
# placeholder — the managed `sf` NEVER holds the real bearer token. At job end the
# session is revoked + zeroized. There is NO org-auth handoff step and NO token
# written to GITHUB_ENV.
#
# CONFINEMENT is unconditional: egress is kernel-enforced ProxyOnly (Landlock v4 /
# kernel 6.7+ on Linux runners), so if the host lacks kernel support, session
# setup fails closed rather than running unconfined.
#
# The caller MUST grant the job `permissions: id-token: write` (so GitHub injects
# the OIDC request endpoint) and set `target-instance` to the Busbar-equipped org
# instance URL.
inputs:
  action:
    description: 'The declarative action as an SfAction JSON document (e.g. {"action":"data_query","target_org":"my-org","soql":"SELECT Id FROM Account"}).'
    required: true
  target-instance:
    description: 'Instance URL of the Busbar-equipped Salesforce org to mint a session against via GitHub OIDC (no trailing slash). REQUIRED for the default OIDC auth path; the job must grant `permissions: id-token: write`.'
    required: false
    default: ''
  eca-client-id:
    description: 'Consumer key of the External Client App in the Busbar-equipped org (non-secret). Defaults to the baked public key when empty.'
    required: false
    default: ''
  token-handler:
    description: 'Apex token-exchange handler dev name. Defaults to `GitHubTokenExchangeHandler` when empty.'
    required: false
    default: ''
  oidc-audience:
    description: 'OIDC token audience. Defaults to `target-instance` when empty.'
    required: false
    default: ''
  sf-cli-version:
    description: 'npm version spec for `@salesforce/cli` to install (e.g. `2.69.6`, or `latest`). Pin an exact version for reproducibility.'
    required: false
    default: 'latest'
  working-dir:
    description: 'Working directory for the `sf` invocation.'
    required: false
    default: ''
  output:
    description: 'Path to write the structured `sf` result JSON (in addition to stdout).'
    required: false
    default: ''
  audit-out:
    description: 'Path to write the JSON audit log for this run.'
    required: false
    default: '.busbar/sandbox-audit.json'
  artifact-name:
    description: >-
      Name for the uploaded sandbox audit + generalized-fingerprint artifact. Must
      be UNIQUE within a workflow run (set a distinct value per sf-cli step).
    required: false
    default: 'busbar-sandbox-sf'

outputs:
  success:
    description: '"true" when the action executed successfully.'
    value: ${{ steps.exec.outputs.success }}
  duration-ms:
    description: 'Wall-clock duration of the sf invocation in milliseconds.'
    value: ${{ steps.exec.outputs.duration-ms }}
  risk-level:
    description: 'Inherent risk level of the action (low | medium | high | critical).'
    value: ${{ steps.exec.outputs.risk-level }}
  sandbox-enforced:
    description: '"true" when kernel-enforced confinement was applied.'
    value: ${{ steps.exec.outputs.sandbox-enforced }}
  audit-path:
    description: 'Path to the JSON audit log written for this run.'
    value: ${{ steps.exec.outputs.audit-path }}
  result-path:
    description: 'Path to the structured sf result JSON (only when `output` was set).'
    value: ${{ steps.exec.outputs.result-path }}
  sf-cli-path:
    description: 'Path to the managed sf binary installed for this run.'
    value: ${{ steps.install.outputs.sf-cli-path }}
  sf-cli-prefix:
    description: 'Prefix directory containing the managed sf install.'
    value: ${{ steps.install.outputs.sf-cli-prefix }}
  sf-cli-version:
    description: 'Version of @salesforce/cli that was installed.'
    value: ${{ steps.install.outputs.sf-cli-version }}

runs:
  using: 'composite'
  steps:
    - name: Install the sf-cli binary from actions-dist
      uses: busbar-actions/setup@main
      with:
        binary: sf-cli
        version: ${{ env.BUSBAR_ACTION_VERSION || 'latest' }}
        binary-repo: ${{ env.BUSBAR_ACTION_REPO || 'busbar-actions/actions-dist' }}

    - name: Install the managed @salesforce/cli (version ${{ inputs.sf-cli-version }}) under RUNNER_TEMP
      id: install
      shell: bash
      env:
        INPUT_SF_CLI_VERSION: ${{ inputs.sf-cli-version }}
      run: |
        set -euo pipefail
        install_dir="${RUNNER_TEMP}/managed-sf-cli"
        echo "Installing @salesforce/cli@${INPUT_SF_CLI_VERSION} into ${install_dir}"
        sf-cli install --version "$INPUT_SF_CLI_VERSION" --install-dir "$install_dir"

    - name: Run the declarative SfAction in the busbar-sandbox (ProxyOnly) against the Busbar-equipped org
      id: exec
      shell: bash
      # Inputs are passed via env (never interpolated into the script) so they
      # cannot break out of the shell. The action JSON is written to a temp file
      # and passed via `--action @file` so arbitrary JSON (quotes, newlines)
      # survives shell expansion intact.
      #
      # AUTH: the binary self-mints a Salesforce session in-process from the OIDC
      # config below and holds the token in the supervisor. `sf` logs in through
      # the injecting proxy with a placeholder — it never holds the real token.
      # Empty auth-config vars fall back to busbar-auth's baked defaults. There is
      # NO token-input escape hatch — OIDC via `target-instance` is the only auth
      # path, no exceptions. No token is written to GITHUB_ENV.
      env:
        INPUT_ACTION: ${{ inputs.action }}
        INPUT_AUDIT_OUT: ${{ inputs.audit-out }}
        INPUT_WORKING_DIR: ${{ inputs.working-dir }}
        INPUT_OUTPUT: ${{ inputs.output }}
        SF_CLI_PATH: ${{ steps.install.outputs.sf-cli-path }}
        SF_INSTANCE_URL: ${{ inputs.target-instance || env.SF_INSTANCE_URL }}
        ECA_CLIENT_ID: ${{ inputs.eca-client-id }}
        TOKEN_HANDLER_APEX: ${{ inputs.token-handler }}
        OIDC_AUDIENCE: ${{ inputs.oidc-audience }}
        # Always write the {org}-masked endpoint declaration + generalized
        # capability fingerprint (uploaded as artifacts below). Distinct from the
        # SfAction `--audit-out` log above.
        BUSBAR_SANDBOX_AUDIT_OUT: ${{ format('{0}/busbar-sandbox-audit.json', runner.temp) }}
        BUSBAR_SANDBOX_FINGERPRINT_OUT: ${{ format('{0}/busbar-sandbox-fingerprint.json', runner.temp) }}
      run: |
        set -euo pipefail
        action_file="${RUNNER_TEMP}/sf-action.json"
        printf '%s\n' "$INPUT_ACTION" > "$action_file"
        echo "Executing the SfAction from ${action_file} in the busbar-sandbox (ProxyOnly) against ${SF_INSTANCE_URL} (audit -> ${INPUT_AUDIT_OUT})"

        args=(exec --action "@${action_file}"
            --audit-out "$INPUT_AUDIT_OUT"
            --sf-cli-path "$SF_CLI_PATH")
        [[ -n "$INPUT_WORKING_DIR" ]] && args+=(--working-dir "$INPUT_WORKING_DIR")
        [[ -n "$INPUT_OUTPUT" ]] && args+=(--output "$INPUT_OUTPUT")

        sf-cli "${args[@]}"

    - name: Upload sandbox audit + generalized fingerprint
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifact-name }}
        path: |
          ${{ format('{0}/busbar-sandbox-audit.json', runner.temp) }}
          ${{ format('{0}/busbar-sandbox-fingerprint.json', runner.temp) }}
        if-no-files-found: warn
        retention-days: 30
