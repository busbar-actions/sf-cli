name: 'Busbar — sf-cli'
description: 'Run a declarative Salesforce CLI action inside a managed nono capability sandbox with a version-pinned sf install and a full audit trail.'
author: 'Busbar'

# A single declarative action (SfAction JSON) is executed under a minimal,
# per-action capability manifest. On GitHub-hosted Linux runners the sandbox is
# enforced with Landlock; the action records exactly which filesystem/network
# capabilities were granted and the outcome, persisted as an audit artifact.
inputs:
  action:
    description: 'The declarative action as an SfAction JSON document (e.g. {"action":"data_query","target_org":"my-org","soql":"SELECT Id FROM Account"}).'
    required: true
  mode:
    description: 'Sandbox enforcement mode: enforce | audit | disabled.'
    required: false
    default: 'enforce'
  sf-cli-version:
    description: 'npm version spec for @salesforce/cli to install (prefer an exact version such as 2.69.6).'
    required: false
    default: 'latest'
  working-dir:
    description: 'Working directory for the sf invocation.'
    required: false
    default: ''
  output:
    description: 'Path to write the structured sf result JSON.'
    required: false
    default: ''
  audit-out:
    description: 'Path to write the JSON audit log.'
    required: false
    default: '.busbar/sandbox-audit.json'
  version:
    description: 'Release tag of the sf-cli binary (e.g. v0.1.0). "latest" resolves the most recent release.'
    required: false
    default: 'latest'
  binary-repo:
    description: 'GitHub repo hosting the prebuilt binary releases.'
    required: false
    default: 'busbar-actions/actions-dist'

outputs:
  success:
    description: '"true" when the action executed successfully.'
    value: ${{ steps.exec.outputs.success }}
  duration-ms:
    description: 'Wall-clock duration of the sf invocation in milliseconds.'
    value: ${{ steps.exec.outputs.duration-ms }}
  risk-level:
    description: 'Inherent risk level of the action (low | medium | high | critical).'
    value: ${{ steps.exec.outputs.risk-level }}
  sandbox-enforced:
    description: '"true" when kernel-enforced confinement was applied.'
    value: ${{ steps.exec.outputs.sandbox-enforced }}
  audit-path:
    description: 'Path to the JSON audit log written for this run.'
    value: ${{ steps.exec.outputs.audit-path }}
  result-path:
    description: 'Path to the structured sf result JSON (only when `output` was set).'
    value: ${{ steps.exec.outputs.result-path }}
  sf-cli-path:
    description: 'Path to the managed sf binary installed for this run.'
    value: ${{ steps.install.outputs.sf-cli-path }}
  sf-cli-prefix:
    description: 'Prefix directory containing the managed sf install.'
    value: ${{ steps.install.outputs.sf-cli-prefix }}
  sf-cli-version:
    description: 'Version of @salesforce/cli that was installed.'
    value: ${{ steps.install.outputs.sf-cli-version }}

runs:
  using: 'composite'
  steps:
    - name: Set up sf-cli
      uses: busbar-actions/setup@main
      with:
        binary: sf-cli
        version: ${{ inputs.version }}
        binary-repo: ${{ inputs.binary-repo }}

    - name: Install managed Salesforce CLI
      id: install
      shell: bash
      run: |
        set -euo pipefail
        install_dir="${RUNNER_TEMP}/managed-sf-cli"
        sf-cli install --version "${{ inputs.sf-cli-version }}" --install-dir "$install_dir"

    - name: Run sandboxed action
      id: exec
      shell: bash
      # The action JSON is written to a temp file and passed via `--action @file`
      # so arbitrary JSON (quotes, newlines) survives shell expansion intact.
      run: |
        set -euo pipefail
        action_file="${RUNNER_TEMP}/sf-action.json"
        cat > "$action_file" <<'BUSBAR_ACTION_EOF'
        ${{ inputs.action }}
        BUSBAR_ACTION_EOF

        args=(exec --action "@${action_file}"
              --mode "${{ inputs.mode }}"
            --audit-out "${{ inputs.audit-out }}"
            --sf-cli-path "${{ steps.install.outputs.sf-cli-path }}")
        [[ -n "${{ inputs.working-dir }}" ]] && args+=(--working-dir "${{ inputs.working-dir }}")
        [[ -n "${{ inputs.output }}" ]] && args+=(--output "${{ inputs.output }}")

          sf-cli "${args[@]}"
